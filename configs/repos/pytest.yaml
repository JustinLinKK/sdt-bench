name: pytest
github_url: https://github.com/pytest-dev/pytest.git
package_name: pytest
ecosystem: PyPI
default_branch: main
language: python
package_manager: pip
install_command: uv pip install -e .
test_command: python -m pytest
dockerfile_path: Dockerfile
supported_dependency_files:
  - pyproject.toml
  - tox.ini
notes: Partial scaffold only in v0. Episode support is not fully implemented yet.
