default_backend: in_memory
paths:
  benchmark_data_dir: benchmark_data
  runs_dir: runs
  workspaces_dir: .workspaces
  qdrant_dir: .qdrant
runtime:
  retrieval_top_k: 5
  chunk_size: 1000
  chunk_overlap: 150
  vector_dimensions: 256
  install_timeout_seconds: 600
  test_timeout_seconds: 600
  query_joiner: "\n"
