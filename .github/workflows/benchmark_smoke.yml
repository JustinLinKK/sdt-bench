name: Benchmark Smoke

on:
  workflow_dispatch:
    inputs:
      timeline:
        description: Timeline key
        required: true
        default: toy
      first_episode:
        description: First episode directory name to validate
        required: true
        default: episode_0001
      agent:
        description: Agent name
        required: true
        default: baseline:dummy
      memory_mode:
        description: Memory mode
        required: true
        default: persistent

jobs:
  benchmark-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Install project
        run: make install

      - name: Run benchmark episode
        run: |
          EPISODE_PATH="benchmark_data/episodes/${{ inputs.timeline }}/${{ inputs.first_episode }}"
          TIMELINE_PATH="benchmark_data/timelines/${{ inputs.timeline }}.yaml"
          uv run python -m sdt_bench.cli validate-step "$EPISODE_PATH"
          uv run python -m sdt_bench.cli run-timeline "$TIMELINE_PATH" --agent "${{ inputs.agent }}" --memory-mode "${{ inputs.memory_mode }}"

      - name: Collect artifacts
        run: |
          AGENT_SLUG="${{ inputs.agent }}"
          AGENT_SLUG="${AGENT_SLUG//:/__}"
          AGENT_SLUG="${AGENT_SLUG//\//__}"
          RUN_ID="$(cat "runs/${{ inputs.timeline }}/${AGENT_SLUG}/last_run.txt")"
          RUN_ROOT="runs/${{ inputs.timeline }}/${AGENT_SLUG}/${RUN_ID}"
          mkdir -p benchmark-artifacts
          cp "${RUN_ROOT}/timeline_result.json" benchmark-artifacts/
          cp "${RUN_ROOT}/timeline_report.md" benchmark-artifacts/
          find "${RUN_ROOT}/steps" -path "*/harness/result.json" -exec cp --parents {} benchmark-artifacts/ \;
          find "${RUN_ROOT}/steps" -path "*/harness/report.md" -exec cp --parents {} benchmark-artifacts/ \;
          find "${RUN_ROOT}/steps" -path "*/output/patch.diff" -exec cp --parents {} benchmark-artifacts/ \;
          find "${RUN_ROOT}/steps" -path "*/output/memory_mutations.jsonl" -exec cp --parents {} benchmark-artifacts/ \;

      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-smoke-${{ inputs.timeline }}
          path: benchmark-artifacts
