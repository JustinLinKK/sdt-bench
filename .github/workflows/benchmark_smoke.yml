name: Benchmark Smoke

on:
  workflow_dispatch:
    inputs:
      repo:
        description: Repository key
        required: true
        default: requests
      episode:
        description: Episode directory name
        required: true
        default: episode_0001
      agent:
        description: Agent name
        required: true
        default: dummy
      backend:
        description: Vector backend
        required: true
        default: qdrant

jobs:
  benchmark-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Install project
        run: make install

      - name: Run benchmark episode
        run: |
          EPISODE_PATH="benchmark_data/episodes/${{ inputs.repo }}/${{ inputs.episode }}"
          uv run python -m sdt_bench.cli validate-episode "$EPISODE_PATH"
          uv run python -m sdt_bench.cli materialize "$EPISODE_PATH"
          uv run python -m sdt_bench.cli ingest-visible-docs "$EPISODE_PATH" --backend "${{ inputs.backend }}"
          uv run python -m sdt_bench.cli run-agent "$EPISODE_PATH" --agent "${{ inputs.agent }}" --backend "${{ inputs.backend }}"
          uv run python -m sdt_bench.cli evaluate "$EPISODE_PATH"
          uv run python -m sdt_bench.cli report "$EPISODE_PATH"

      - name: Collect artifacts
        run: |
          SLUG="${{ inputs.repo }}__${{ inputs.episode }}"
          RUN_ID="$(cat "runs/${SLUG}/last_run.txt")"
          mkdir -p benchmark-artifacts
          cp "runs/${SLUG}/${RUN_ID}/mutation_log.jsonl" benchmark-artifacts/
          cp "runs/${SLUG}/${RUN_ID}/retrieval_trace.json" benchmark-artifacts/
          cp "runs/${SLUG}/${RUN_ID}/patch.diff" benchmark-artifacts/
          cp "runs/${SLUG}/${RUN_ID}/result.json" benchmark-artifacts/
          cp "runs/${SLUG}/${RUN_ID}/report.md" benchmark-artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-smoke-${{ inputs.repo }}-${{ inputs.episode }}
          path: benchmark-artifacts
